name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary-name: sail-linux-amd64
            checksum-cmd: sha256sum
          - os: macos-latest
            binary-name: sail-darwin-arm64
            checksum-cmd: shasum -a 256
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: mvn clean test

      - name: Build native image
        run: mvn package -Pnative -DskipTests

      - name: Smoke test
        run: ./sing-infra/target/sail -V

      - name: Rename binary
        run: mv sing-infra/target/sail sing-infra/target/${{ matrix.binary-name }}

      - name: Generate checksum
        run: ${{ matrix.checksum-cmd }} sing-infra/target/${{ matrix.binary-name }} | awk '{print $1}' > sing-infra/target/${{ matrix.binary-name }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary-name }}
          path: |
            sing-infra/target/${{ matrix.binary-name }}
            sing-infra/target/${{ matrix.binary-name }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Create legacy aliases for backward compatibility
        run: |
          cp sail-linux-amd64/sail-linux-amd64 sail-linux-amd64/sail
          cp sail-linux-amd64/sail-linux-amd64.sha256 sail-linux-amd64/sail.sha256
          cp sail-linux-amd64/sail-linux-amd64 sail-linux-amd64/sing-linux-amd64
          cp sail-linux-amd64/sail-linux-amd64.sha256 sail-linux-amd64/sing-linux-amd64.sha256
          cp sail-linux-amd64/sail-linux-amd64 sail-linux-amd64/sing
          cp sail-linux-amd64/sail-linux-amd64.sha256 sail-linux-amd64/sing.sha256
          cp sail-darwin-arm64/sail-darwin-arm64 sail-darwin-arm64/sing-darwin-arm64
          cp sail-darwin-arm64/sail-darwin-arm64.sha256 sail-darwin-arm64/sing-darwin-arm64.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sail-linux-amd64/sail
            sail-linux-amd64/sail.sha256
            sail-linux-amd64/sail-linux-amd64
            sail-linux-amd64/sail-linux-amd64.sha256
            sail-linux-amd64/sing
            sail-linux-amd64/sing.sha256
            sail-linux-amd64/sing-linux-amd64
            sail-linux-amd64/sing-linux-amd64.sha256
            sail-darwin-arm64/sail-darwin-arm64
            sail-darwin-arm64/sail-darwin-arm64.sha256
            sail-darwin-arm64/sing-darwin-arm64
            sail-darwin-arm64/sing-darwin-arm64.sha256
          generate_release_notes: true
